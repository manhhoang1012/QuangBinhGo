services:
  postgres:
    image: postgres:16-alpine
    container_name: quangbinhgo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quangbinhgo
      POSTGRES_USER: quangbinhgo
      POSTGRES_PASSWORD: quangbinhgo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quangbinhgo -d quangbinhgo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
